name: LRZ GitLab CI

on:
  push:
    branches: [develop, main]
  pull_request:
    types: [opened, synchronize, reopened, unlabeled, labeled]
  schedule:
    - cron: '00 8 * * 0'  # Runs at 10 AM CEST (08:00 UTC) every Sunday
  workflow_dispatch:      # Allows manual trigger

concurrency:
  group: >
    ${{ github.workflow }}-
    ${{ github.event_name }}-
    ${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-test-neon:
    name: Build and test NeoN & NeoFOAM on GPU
    runs-on: ubuntu-latest
    timeout-minutes: 1440 # 24 hours

    outputs:
      branch: ${{ steps.branch.outputs.branch }}
      skip-nvidia: ${{ steps.skip-labels.outputs.skip-nvidia }}
      skip-amd: ${{ steps.skip-labels.outputs.skip-amd }}
      skip-intel: ${{ steps.skip-labels.outputs.skip-intel }}

    if: >
      github.event_name != 'pull_request' ||
      !contains(github.event.pull_request.labels.*.name, 'skip-build')

    env:
      LRZ_GROUP: greole
      LRZ_HOST: gitlab-ce.lrz.de
      REPO_NAME: ${{ github.event.repository.name }}
      NEOFOAM_REPO: NeoFOAM
      NEON_PROJECT_TOKEN: ${{ secrets.LRZ_GITLAB_PROJECT_TOKEN }}
      NEON_TRIGGER_TOKEN: ${{ secrets.LRZ_GITLAB_TRIGGER_TOKEN }}
      NEOFOAM_PROJECT_TOKEN: ${{ secrets.NEOFOAM_LRZ_GITLAB_PROJECT_TOKEN }}
      NEOFOAM_TRIGGER_TOKEN: ${{ secrets.NEOFOAM_LRZ_GITLAB_TRIGGER_TOKEN }}
      MAX_WAIT_MINUTES: 1440

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine branch
        id: branch
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request"* ]]; then
            BRANCH="$GITHUB_HEAD_REF"
          else
            BRANCH=${GITHUB_REF_NAME#refs/heads/}
          fi
          echo "Determined NeoN branch: $BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Determine skip labels
        id: skip-labels
        run: |
          # default values
          echo "skip-nvidia=false" >> $GITHUB_OUTPUT
          echo "skip-amd=false" >> $GITHUB_OUTPUT
          echo "skip-intel=false" >> $GITHUB_OUTPUT

          # Only check labels if this is a PR
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            labels=$(jq -r '.pull_request.labels[].name // empty' "$GITHUB_EVENT_PATH")
            for label in $labels; do
              case "$label" in
                skip-nvidia) echo "skip-nvidia=true" >> $GITHUB_OUTPUT ;;
                skip-amd)    echo "skip-amd=true" >> $GITHUB_OUTPUT ;;
                skip-intel)  echo "skip-intel=true" >> $GITHUB_OUTPUT ;;
              esac
            done
          fi

      - name: Debug skip outputs
        run: |
          echo "skip-nvidia=${{ steps.skip-labels.outputs.skip-nvidia }}"
          echo "skip-amd=${{ steps.skip-labels.outputs.skip-amd }}"
          echo "skip-intel=${{ steps.skip-labels.outputs.skip-intel }}"

      - name: Push commit to NeoN LRZ GitLab
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add lrz https://oauth2:${NEON_PROJECT_TOKEN}@${{ env.LRZ_HOST }}/${{ env.LRZ_GROUP }}/${{ env.REPO_NAME }}.git
          git fetch origin ${{ steps.branch.outputs.branch }}
          git checkout -B ${{ steps.branch.outputs.branch }} origin/${{ steps.branch.outputs.branch }}
          git reset --hard origin/${{ steps.branch.outputs.branch }}
          git push --force lrz HEAD:refs/heads/${{ steps.branch.outputs.branch }}

      - name: Cancel running/pending NeoN LRZ CI pipelines
        if: ${{ github.event_name != 'push' }}
        run: |
          ./ci/github/cancel_triggered_pipelines.sh \
            "${{ env.REPO_NAME }}" \
            "${{ steps.branch.outputs.branch }}" \
            "${NEON_PROJECT_TOKEN}"

      - name: Trigger NeoN LRZ GitLab CI pipeline
        id: trigger-neon
        run: |
          ./ci/github/trigger_pipeline.sh \
            "${{ env.REPO_NAME }}" \
            "${{ steps.branch.outputs.branch }}" \
            "${NEON_PROJECT_TOKEN}" \
            "${NEON_TRIGGER_TOKEN}" \
            "variables[BENCHMARK]=false" \
            "variables[SKIP_NVIDIA]=${{ steps.skip-labels.outputs.skip-nvidia }}" \
            "variables[SKIP_AMD]=${{ steps.skip-labels.outputs.skip-amd }}" \
            "variables[SKIP_INTEL]=${{ steps.skip-labels.outputs.skip-intel }}"

      - name: Wait for NeoN LRZ GitLab CI pipeline
        run: |
          ./ci/github/wait_pipeline.sh \
            "${{ env.REPO_NAME }}" \
            "${{ steps.trigger-neon.outputs.pipeline_id }}" \
            "${NEON_PROJECT_TOKEN}"

      - name: Cancel running/pending NeoFOAM LRZ CI pipelines
        run: |
          ./ci/github/cancel_triggered_pipelines.sh \
            "${{ env.NEOFOAM_REPO }}" \
            "${{ steps.branch.outputs.branch }}" \
            "${NEOFOAM_PROJECT_TOKEN}"

      - name: Trigger NeoFOAM LRZ GitLab CI pipeline
        id: trigger-neofoam
        run: |
          ./ci/github/trigger_pipeline.sh \
            "${{ env.NEOFOAM_REPO }}" \
            "${{ steps.branch.outputs.branch }}" \
            "${NEOFOAM_PROJECT_TOKEN}" \
            "${NEOFOAM_TRIGGER_TOKEN}" \
            "variables[NEON_BRANCH]=${{ steps.branch.outputs.branch }}" \
            "variables[TRIGGER_SOURCE]=${{ github.event.repository.name }}" \
            "variables[BENCHMARK]=false" \
            "variables[SKIP_NVIDIA]=${{ steps.skip-labels.outputs.skip-nvidia }}" \
            "variables[SKIP_AMD]=${{ steps.skip-labels.outputs.skip-amd }}" \
            "variables[SKIP_INTEL]=${{ steps.skip-labels.outputs.skip-intel }}"

      - name: Wait for NeoFOAM LRZ GitLab CI pipeline
        run: |
          ./ci/github/wait_pipeline.sh \
            "${{ env.NEOFOAM_REPO }}" \
            "${{ steps.trigger-neofoam.outputs.pipeline_id }}" \
            "${NEOFOAM_PROJECT_TOKEN}"

      - name: Delete remote branch on LRZ GitLab
        if: always()
        run: |
          BRANCH="${{ steps.branch.outputs.branch }}"

          # Never delete protected branches
          case "$BRANCH" in
            main|develop)
              echo "Skipping deletion of protected branch: $BRANCH"
              exit 0
              ;;
          esac

          echo "Deleting remote branch '$BRANCH' from LRZ GitLab..."
          git push lrz --delete "$BRANCH"

  benchmark:
    name: Benchmark NeoN on GPU
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    needs: [build-and-test-neon]

    if: >
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'benchmark')

    env:
      LRZ_GROUP: greole
      LRZ_HOST: gitlab-ce.lrz.de
      REPO_NAME: ${{ github.event.repository.name }}
      BRANCH: ${{ needs.build-and-test-neon.outputs.branch }}
      SKIP_NVIDIA: ${{ needs.build-and-test.outputs.skip-nvidia }}
      SKIP_AMD: ${{ needs.build-and-test.outputs.skip-amd }}
      SKIP_INTEL: ${{ needs.build-and-test.outputs.skip-intel }}
      NEON_PROJECT_TOKEN: ${{ secrets.LRZ_GITLAB_PROJECT_TOKEN }}
      NEON_TRIGGER_TOKEN: ${{ secrets.LRZ_GITLAB_TRIGGER_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Push commit to NeoN LRZ GitLab
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add lrz https://oauth2:${NEON_PROJECT_TOKEN}@${{ env.LRZ_HOST }}/${{ env.LRZ_GROUP }}/${{ env.REPO_NAME }}.git
          git fetch origin ${BRANCH}
          git checkout -B ${BRANCH} origin/${BRANCH}
          git reset --hard origin/${BRANCH}
          git push --force lrz HEAD:refs/heads/${BRANCH}

      - name: Cancel running/pending NeoN LRZ CI pipelines
        run: |
          ./ci/github/cancel_triggered_pipelines.sh \
            "${{ env.REPO_NAME }}" \
            "${BRANCH}" \
            "${NEON_PROJECT_TOKEN}"

      - name: Trigger NeoN LRZ GitLab CI pipeline for benchmarking
        id: trigger-neon
        run: |
          ./ci/github/trigger_pipeline.sh \
            "${{ env.REPO_NAME }}" \
            "${BRANCH}" \
            "${NEON_PROJECT_TOKEN}" \
            "${NEON_TRIGGER_TOKEN}" \
            "variables[BENCHMARK]=true" \
            "variables[PR_NUMBER]=${{ github.event.pull_request.number || 'no-pr' }}" \
            "variables[SKIP_NVIDIA]=${SKIP_NVIDIA}" \
            "variables[SKIP_AMD]=${SKIP_AMD}" \
            "variables[SKIP_INTEL]=${SKIP_INTEL}"

      - name: Wait for NeoN LRZ GitLab CI pipeline for benchmarking
        run: |
          ./ci/github/wait_pipeline.sh \
            "${{ env.REPO_NAME }}" \
            "${{ steps.trigger-neon.outputs.pipeline_id }}" \
            "${NEON_PROJECT_TOKEN}"

      - name: Delete remote branch on LRZ GitLab
        if: always()
        run: |
          case "$BRANCH" in
            main|develop)
              echo "Skipping deletion of protected branch: $BRANCH"
              exit 0
              ;;
          esac

          echo "Deleting remote branch '$BRANCH' from LRZ GitLab..."
          git push lrz --delete "$BRANCH"
