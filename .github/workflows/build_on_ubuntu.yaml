name: Build NeoN on ubuntu
run-name: "Build workflow"

on:
  push:
    branches: [develop, main]
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  schedule:
    - cron: "00 8 * * 0" # Runs at 10 AM CEST (08:00 UTC) every Sunday
  workflow_dispatch: # Optional: allows manual trigger

env:
  CTEST_OUTPUT_ON_FAILURE: 1
  OMPI_MCA_rmaps_base_oversubscribe: 1

concurrency:
  group: >
    ${{ github.workflow }}-
    ${{ github.event_name }}-
    ${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request' ||
      !contains(github.event.pull_request.labels.*.name, 'skip-build')
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - CC: clang
            CXX: clang++
          - CC: gcc
            CXX: g++
        preset: ["develop", "profiling", "production"]
        exclude:
          - compiler:
              CC: gcc
              CXX: g++
            preset: "develop"
          - compiler:
              CC: clang
              CXX: clang++
            preset: "profiling"
    steps:
      - name: Checkout to repository
        uses: actions/checkout@v4

      - name: Add clang repo
        run: |
          sudo add-apt-repository 'deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-16 main'
          wget https://apt.llvm.org/llvm-snapshot.gpg.key
          sudo apt-key add llvm-snapshot.gpg.key

      - name: Set up cache
        uses: actions/cache@v4
        if: ${{!contains(github.event.pull_request.labels.*.name, 'Skip-cache')}}
        with:
          path: build
          key: ubuntu_build_PR_${{ github.event.pull_request.number }}_${{matrix.compiler.CC}}_${{matrix.preset}}

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install \
            ninja-build \
            clang-19 \
            gcc-10 \
            libomp-16-dev \
            build-essential \
            libopenmpi-dev \
            openmpi-bin
          sudo apt remove clang-14
          sudo rm /usr/bin/clang
          sudo rm /usr/bin/clang++
          sudo ln -s /usr/bin/clang-19 /usr/bin/clang
          sudo ln -s /usr/bin/clang++-19 /usr/bin/clang++

      - name: Get versions
        run: |
          clang --version
          ninja --version
          cmake --version

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install python package
        run: |
          # create virtual environment
          python -m venv venv
          source venv/bin/activate
          pip install nanobind pytest numpy

      - name: Build NeoN without Ginkgo
        if: ${{!contains(github.event.pull_request.labels.*.name, 'full-ci')}}
        run: |
          source venv/bin/activate

          CMAKE_FLAGS_ARR=(
            -DNeoN_BUILD_TESTS=ON
            -DNeoN_BUILD_PYTHON_BINDINGS=ON
            -DNeoN_DEVEL_TOOLS=OFF
            -DNeoN_WITH_GINKGO=OFF
            -DNeoN_ENABLE_MPI_WITH_THREAD_SUPPORT=OFF
          )

          CC=${{matrix.compiler.CC}}
          CXX=${{matrix.compiler.CXX}}
          cmake --preset ${{matrix.preset}} "${CMAKE_FLAGS_ARR[@]}"
          cmake --build  --preset ${{matrix.preset}}

      - name: Execute unit tests NeoN
        run: |
          source venv/bin/activate
          ctest --preset ${{matrix.preset}} -E bench

      - name: Install NeoN
        run:  |
          sudo cmake --install build/${{matrix.preset}}
          sudo ls -la /usr/local/bin
          sudo ls -la /usr/local/lib
          neon_test_vector
