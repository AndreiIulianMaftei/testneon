# ============================================================
#  GPU-specific images and runner configuration
# ============================================================
.gpu-nvidia:
  tags: ["nvidia-gpus"]
  image: chihtaw/cuda-openfoam-ginkgo:12.8.1-v2412-arch_89
  variables:
    GPU_VENDOR: nvidia

.gpu-amd:
  tags: ["amd-gpus"]
  image: chihtaw/rocm-openfoam-ginkgo:6.4.1-v2412-arch_gfx90a
  variables:
    GPU_VENDOR: amd

.gpu-intel:
  tags: ["intel-gpus"]
  image: dheerajraghunathan/oneapi-openfoam-ginkgo:2025.3-v2412-arch_pvc
  variables:
    GPU_VENDOR: intel

# ============================================================
#  Benchmarking setup
# ============================================================
.setup-for-benchmarking:
  variables:
    RESULTS_DIR: "benchmark-results"
    RUN_IDENTIFIER: "${CI_PIPELINE_ID}"
    REPO_NAME: "NeoFOAM-BenchmarkData"
    TARGET_REPO: "github.com/exasim-project/${REPO_NAME}.git"

  before_script:
    - pip3 install --user --break-system-packages xmltodict

# ============================================================
#  Rule blocks
# ============================================================
# testing
.rules-neon-testing:
  rules:
    - if: '$GPU_VENDOR == "nvidia" && $SKIP_NVIDIA != "true" &&
           $CI_PIPELINE_SOURCE == "trigger" && $BENCHMARK != "true"'
      when: always

    - if: '$GPU_VENDOR == "amd" && $SKIP_AMD != "true" &&
           $CI_PIPELINE_SOURCE == "trigger" && $BENCHMARK != "true"'
      when: always

    - if: '$GPU_VENDOR == "intel" && $SKIP_INTEL != "true" &&
           $CI_PIPELINE_SOURCE == "trigger" && $BENCHMARK != "true"'
      when: always
    - when: never

# benchmarking
.rules-neon-benchmarking:
  rules:
    - if: '$GPU_VENDOR == "nvidia" && $SKIP_NVIDIA != "true" &&
           $CI_PIPELINE_SOURCE == "trigger" && $BENCHMARK == "true"'
      when: always

    - if: '$GPU_VENDOR == "amd" && $SKIP_AMD != "true" &&
           $CI_PIPELINE_SOURCE == "trigger" && $BENCHMARK == "true"'
      when: always

    - if: '$GPU_VENDOR == "intel" && $SKIP_INTEL != "true" &&
           $CI_PIPELINE_SOURCE == "trigger" && $BENCHMARK == "true"'
      when: always
    - when: never

# ============================================================
#  Job templates
# ============================================================
.build-and-test:
  script:
    - ./ci/lrz-gitlab/build-and-test.sh

.benchmark:
  extends:
    - .setup-for-benchmarking
  script:
    - ./ci/lrz-gitlab/benchmark.sh

# ============================================================
#  NeoN - testing jobs
# ============================================================
build-test-neon-nvidia:
  extends:
    - .gpu-nvidia
    - .rules-neon-testing
    - .build-and-test

build-test-neon-amd:
  extends:
    - .gpu-amd
    - .rules-neon-testing
    - .build-and-test

build-test-neon-intel:
  extends:
    - .gpu-intel
    - .rules-neon-testing
    - .build-and-test

# ============================================================
#  NeoN - benchmarking jobs
# ============================================================
benchmark-neon-nvidia:
  extends:
    - .gpu-nvidia
    - .rules-neon-benchmarking
    - .benchmark

benchmark-neon-amd:
  extends:
    - .gpu-amd
    - .rules-neon-benchmarking
    - .benchmark

benchmark-neon-intel:
  extends:
    - .gpu-intel
    - .rules-neon-benchmarking
    - .benchmark
