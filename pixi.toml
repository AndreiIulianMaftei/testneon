[workspace]
name = "neon"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[dependencies]
cmake = ">=3.22"
ninja = "*"
cxx-compiler = "*"
pip = "*"
scikit-build-core = ">=0.11.0"
nanobind = ">=2.9.0"
nlohmann_json = "*"

[activation.env]
CMAKE_BUILD_PARALLEL_LEVEL = "1"

[feature.py311.dependencies]
python = "3.11.*"

[feature.py312.dependencies]
python = "3.12.*"

[feature.test.dependencies]
pytest = ">=6"

[feature.cuda.target.linux-64.dependencies]
cuda-nvcc = ">=12.8,<14"
cuda-cudart-dev = ">=12.8,<14"

[feature.cuda.target.win-64.dependencies]
cuda-nvcc = ">=12.8,<14"
cuda-cudart-dev = ">=12.8,<14"

[tasks]
configure = { cmd = ["cmake", "-S", ".", "-B", "build/pixi", "-G", "Ninja", "-DCMAKE_BUILD_TYPE=Release", "-DNeoN_BUILD_PYTHON_BINDINGS=ON", "-DNeoN_BUILD_TESTS=ON", "-DNeoN_WITH_MPI=OFF", "-DKokkos_ENABLE_SERIAL=ON", "-DKokkos_ENABLE_CUDA=OFF", "-DKokkos_ENABLE_HIP=OFF"] }
build = { cmd = ["cmake", "--build", "build/pixi", "-j1"], depends-on = ["configure"] }
test = { cmd = ["ctest", "--test-dir", "build/pixi", "--output-on-failure"], depends-on = ["build"] }
configure-cuda = { cmd = ["cmake", "-S", ".", "-B", "build/pixi-cuda", "-G", "Ninja", "-DCMAKE_BUILD_TYPE=Release", "-DNeoN_BUILD_PYTHON_BINDINGS=ON", "-DNeoN_BUILD_TESTS=ON", "-DNeoN_WITH_MPI=OFF", "-DKokkos_ENABLE_SERIAL=ON", "-DKokkos_ENABLE_CUDA=ON", "-DKokkos_ENABLE_HIP=OFF"] }
build-cuda = { cmd = ["cmake", "--build", "build/pixi-cuda", "-j1"], depends-on = ["configure-cuda"] }
test-cuda = { cmd = ["ctest", "--test-dir", "build/pixi-cuda", "--output-on-failure"], depends-on = ["build-cuda"] }

[environments]
default = { features = ["py312", "test"], solve-group = "py312" }
py311 = { features = ["py311", "test"], solve-group = "py311" }
py312 = { features = ["py312", "test"], solve-group = "py312" }
build = { features = ["py312"], solve-group = "py312" }
cuda = { features = ["py312", "test", "cuda"], solve-group = "py312-cuda" }
